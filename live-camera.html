<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>户外视频 · PsyHealth</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .camera-shell { width: min(100%, 920px); min-height: 100vh; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom)); }
    .camera-panel { padding: clamp(18px, 4vw, 28px); border: 1px solid rgba(213, 228, 238, .95); border-radius: 24px; background: rgba(255,255,255,.94); box-shadow: 0 22px 55px rgba(42, 78, 101, .12); }
    .camera-frame { position: relative; aspect-ratio: 16 / 9; min-height: 220px; overflow: hidden; border-radius: 18px; background: #102333; }
    #ezvizPlayer { width: 100%; height: 100%; }
    .camera-empty { position: absolute; inset: 0; display: grid; place-items: center; padding: 24px; color: #eaf6fb; text-align: center; }
    .camera-empty strong { display: block; margin-bottom: 8px; font-size: 1.2rem; }
    .camera-empty span { color: rgba(234,246,251,.78); line-height: 1.7; }
    .camera-form { display: grid; grid-template-columns: 1.2fr .45fr .55fr 1.4fr auto auto; gap: 10px; align-items: end; margin-top: 16px; }
    .camera-form label { display: grid; gap: 7px; color: #244b5d; font-weight: 750; font-size: .9rem; }
    .camera-form input, .camera-form select { min-height: 42px; border: 1px solid #c7dce3; border-radius: 12px; padding: 8px 11px; background: #fff; color: var(--ink); font: inherit; }
    .camera-status { min-height: 1.5em; margin: 12px 0 0; color: var(--muted); font-weight: 700; }
    .camera-status.is-error { color: #b33d45; }
    .camera-note { margin: 14px 0 0; color: var(--muted); line-height: 1.65; font-size: .92rem; }
    @media (max-width: 860px) { .camera-form { grid-template-columns: 1fr 1fr; } .camera-form label:first-child, .camera-form label:nth-child(4) { grid-column: 1 / -1; } }
    @media (max-width: 520px) { .camera-shell { padding-left: 12px; padding-right: 12px; } .camera-form { grid-template-columns: 1fr; } .camera-form label:first-child, .camera-form label:nth-child(4) { grid-column: auto; } }
  </style>
</head>
<body>
  <main class="camera-shell">
    <header class="topbar">
      <a class="home-link" href="index.html">← 返回首页</a>
      <span class="brand-pill">户外视频</span>
    </header>

    <section class="camera-panel" aria-label="户外实时视频">
      <div class="camera-frame">
        <div id="ezvizPlayer"></div>
        <div class="camera-empty" id="cameraEmpty"><div><strong>点击播放查看实时画面</strong><span>省电模式下，设备唤醒可能需要几秒钟。</span></div></div>
      </div>

      <form class="camera-form" id="cameraForm">
        <label>设备序列号<input id="deviceSerial" autocomplete="off" placeholder="填写萤石设备序列号" required></label>
        <label>通道<input id="channelNo" inputmode="numeric" value="1" required></label>
        <label>清晰度<select id="quality"><option value="live">普清</option><option value="hd.live">高清</option></select></label>
        <label>AccessToken<input id="accessToken" autocomplete="off" placeholder="临时测试可手动填写"></label>
        <button class="primary-btn" type="submit">播放</button>
        <button class="secondary-btn" id="stopBtn" type="button">停止</button>
      </form>

      <p class="camera-status" id="cameraStatus">等待播放</p>
      <p class="camera-note">正式使用时，建议由服务器生成 AccessToken；这里不会要求填写 AppSecret。</p>
    </section>
  </main>

  <script src="https://openstatic.ys7.com/ezuikit/ezuikit.js"></script>
  <script>
    const form = document.getElementById("cameraForm");
    const statusEl = document.getElementById("cameraStatus");
    const emptyEl = document.getElementById("cameraEmpty");
    const playerEl = document.getElementById("ezvizPlayer");
    let player = null;

    const saved = JSON.parse(localStorage.getItem("psyhealthCameraSettings") || "{}");
    deviceSerial.value = saved.deviceSerial || "";
    channelNo.value = saved.channelNo || "1";
    quality.value = saved.quality || "live";

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.classList.toggle("is-error", Boolean(isError));
    }

    function saveSettings() {
      localStorage.setItem("psyhealthCameraSettings", JSON.stringify({
        deviceSerial: deviceSerial.value.trim(),
        channelNo: channelNo.value.trim() || "1",
        quality: quality.value
      }));
    }

    async function getToken() {
      const manualToken = accessToken.value.trim();
      if (manualToken) return manualToken;
      const response = await fetch("/api/ezviz-token", { cache: "no-store" });
      if (!response.ok) throw new Error("请填写 AccessToken，或先配置 /api/ezviz-token");
      const data = await response.json();
      if (!data.accessToken) throw new Error("/api/ezviz-token 没有返回 accessToken");
      return data.accessToken;
    }

    function stopPlayer() {
      if (player && typeof player.stop === "function") player.stop();
      if (player && typeof player.destroy === "function") player.destroy();
      player = null;
      playerEl.innerHTML = "";
      emptyEl.style.display = "grid";
      setStatus("已停止", false);
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      if (!window.EZUIKit || !window.EZUIKit.EZUIKitPlayer) {
        setStatus("播放器 SDK 未加载，请稍后重试", true);
        return;
      }
      try {
        setStatus("正在准备播放", false);
        saveSettings();
        const token = await getToken();
        stopPlayer();
        const url = `ezopen://open.ys7.com/${deviceSerial.value.trim()}/${channelNo.value.trim() || "1"}.${quality.value}`;
        emptyEl.style.display = "none";
        setStatus("正在唤醒设备", false);
        player = new EZUIKit.EZUIKitPlayer({
          id: "ezvizPlayer",
          accessToken: token,
          url,
          template: "pcLive",
          width: playerEl.clientWidth,
          height: playerEl.clientHeight,
          audio: false
        });
        setStatus("播放中", false);
      } catch (error) {
        emptyEl.style.display = "grid";
        setStatus(error.message || "播放失败", true);
      }
    });

    document.getElementById("stopBtn").addEventListener("click", stopPlayer);
    window.addEventListener("beforeunload", stopPlayer);
  </script>
</body>
</html>
