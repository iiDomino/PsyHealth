<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PsyHealth自测量表</title>
    <!-- 引入 html2canvas 用于截图 -->
    <script src="html2canvas.min.js"></script>
    <style>
        /* 基础重置，确保全屏高度 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: #dbeaf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 46px 2px max(2px, env(safe-area-inset-bottom));
            box-sizing: border-box;
        }
        .phone {
            max-width: 420px;
            width: 100%;
            height: calc(100vh - 50px);
            height: calc(100dvh - 50px);
            background: #ffffff;
            border-radius: 36px 36px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 45, 70, 0.25);
            overflow: hidden;
            padding: 0 8px 0 8px;
            border: 1px solid rgba(130, 185, 225, 0.35);
            display: flex;
            flex-direction: column;
        }
        .view {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .view.active {
            display: flex;
        }

        /* 垂直居中容器（用于每个视图） */
        .centered-wrapper {
            margin: auto 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header {
            text-align: center;
        }
        .title-main {
            font-size: 1.5rem;
            font-weight: 550;
            letter-spacing: -0.5px;
            color: #0b3b54;
            line-height: 1.2;
            word-break: break-word;
        }

        /* 答题视图 */
        .progress-section {
            margin: 0;
        }
        .progress-track {
            background: #d0e4f2;
            height: 6px;
            border-radius: 20px;
            width: 100%;
        }
        .progress-fill {
            background: #21729c;
            height: 6px;
            border-radius: 20px;
            width: 0%;
            transition: width 0.2s ease;
        }
        .card {
            background: #f6fbfe;
            border: 1px solid #c2ddec;
            border-radius: 24px;
            padding: 10px 10px 12px 10px;
            box-shadow: 0 8px 18px -8px #9ebed1;
        }
        .question-num {
            background: #1c6c96;
            color: white;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 470;
            line-height: 1.4;
            color: #01273a;
            margin-bottom: 12px;
            word-break: break-word;
            height: 4.2rem;
            min-height: 4.2rem;
            max-height: 4.2rem;
            overflow-y: auto;
        }
        /* 新增提示语样式 */
        .question-hint {
            font-size: 0.8rem;
            color: #5a7a95;
            margin: -4px 0 12px 2px;
            letter-spacing: 0.2px;
            font-style: italic;
        }
        .option-grid {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .option-btn {
            background: white;
            border: 2px solid #bad2e9;
            border-radius: 100px;
            padding: 7px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.08s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.03);
        }
        .option-btn:active { background: #ecf6ff; transform: scale(0.99); }
        .option-btn.selected { background: #166b99; border-color: #166b99; }
        .option-marker {
            width: 32px; height: 32px; border-radius: 32px; background: #deeefa;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; color: #135e86; flex-shrink: 0;
            text-transform: uppercase;
        }
        .option-btn.selected .option-marker { background: white; color: #166b99; }
        .option-text { font-size: 0.95rem; font-weight: 500; color: #0a3b54; word-break: break-word; }
        .option-btn.selected .option-text { color: white; }

        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }
        .nav-btn {
            flex: 1;
            background: white;
            border: 2px solid #30769c;
            border-radius: 60px;
            padding: 8px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1f618b;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.1s;
            text-align: center;
            min-width: 70px;
        }
        .nav-btn:active { background: #e2f0fa; }
        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #a1b9cc;
        }

        /* 结果视图 */
        .result-header {
            display: flex; align-items: center; justify-content: center;
        }
        .result-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px;
        }
        .factor-card {
            background: white; border-radius: 18px; padding: 6px 4px;
            border-left: 5px solid #4894c0; box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            cursor: pointer; transition: 0.1s;
        }
        .factor-card:active { background: #ecf5fc; }
        .factor-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.75rem; color: #14445f; }
        .factor-bar { background: #d2e5f5; height: 4px; border-radius: 20px; margin: 4px 0 4px; }
        .factor-fill { height: 4px; border-radius: 20px; background: #256f94; width: 0%; }
        .factor-score { font-size: 0.55rem; color: #1f6588; word-break: break-word; }
        .global-row {
            background: white; border-radius: 22px; padding: 8px; margin-top: 4px;
            display: flex; flex-wrap: wrap; gap: 6px 8px; font-weight: 500; color: #0a3850;
            font-size: 0.7rem;
        }
        /* 评测日期时间样式 */
        .result-datetime {
            text-align: center;
            font-size: 0.75rem;
            color: #2f6c8f;
            background: #e2f0f8;
            padding: 6px 10px;
            border-radius: 40px;
            margin: 6px 0 2px 0;
            font-weight: 400;
        }
        .capture-btn {
            background: #1c6c96;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 7px 10px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.1s;
            width: 100%;
            text-align: center;
        }
        .capture-btn:active { background: #0f4a70; }

        /* 详情视图 */
        .detail-card {
            background: #f0f8ff;
            border-radius: 24px;
            padding: 10px 10px;
            border: 1px solid #b5d6ed;
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .detail-title { font-size: 1.4rem; font-weight: 500; color: #003153; margin-bottom: 4px; word-break: break-word; }
        .detail-sub { font-size: 0.9rem; color: #1f618d; margin-bottom: 4px; font-weight: 400; word-break: break-word; }
        .detail-content { 
            font-size: 0.75rem; 
            line-height: 1.4; 
            color: #123e59; 
            margin-bottom: 8px; 
            background: #e6f2fa; 
            padding: 8px; 
            border-radius: 18px;
            white-space: pre-line;
            word-break: break-word;
        }
        .detail-score { 
            background: #d8e9f5; 
            border-radius: 22px; 
            padding: 8px; 
            margin: 6px 0; 
            font-size: 0.75rem;
        }
        .level-desc {
            background: #cde4f2;
            border-radius: 20px;
            padding: 8px;
            margin: 6px 0;
            font-size: 0.7rem;
            color: #013a55;
        }
        .level-item {
            margin-bottom: 4px;
            padding-left: 6px;
            border-left: 4px solid #1c6c96;
            word-break: break-word;
        }
        .back-from-detail {
            background: #1c6c96; color: white; border: none; border-radius: 60px; padding: 8px;
            font-size: 0.9rem; font-weight: 600; width: 100%; cursor: pointer; margin-top: 4px;
        }

        .home-floating { position: fixed; top: 12px; left: 14px; z-index: 20; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.92); color: #1f618b; text-decoration: none; font-size: .8rem; font-weight: 700; box-shadow: 0 4px 14px rgba(0,45,70,.14); }
        .footnote {
            font-size: 0.55rem;
            color: #437a9b;
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>

<a class="home-floating" href="index.html" data-html2canvas-ignore="true">← 返回主页</a>
<div class="phone">
    <!-- 答题视图 -->
    <div id="quizView" class="view active">
        <div class="centered-wrapper">

    <!-- 结果总览视图 -->
    <div id="resultView" class="view">
        <div class="centered-wrapper">

                <div id="resultDatetime" class="result-datetime"></div>

            <div class="footnote">点击任一因子查看详细解释</div>
        </div>
    </div>

    <!-- 因子详情视图 -->
    <div id="detailView" class="view">
        <div class="centered-wrapper">
            <div class="result-header">
                <button class="back-btn" id="backToResultBtn">←</button>
                <div class="title-main" id="detailFactorName">因子名称</div>
                <div style="width:32px;"></div>
            </div>
            <div class="detail-card">
                <div class="detail-sub" id="detailSub">得分与临界</div>
                <div class="detail-content" id="detailDescription">详细解释载入中...</div>
                <div class="detail-score" id="detailScoreBox"></div>
                <div class="level-desc" id="levelDescription"></div>
            </div>
            <button class="back-from-detail" id="backToResultFromDetailBtn">返回结果总览</button>
        </div>
    </div>
</div>

        int: { name: "人际关系敏感", count: 9, max: 36, crit: 18, fullDesc: "主要指个人不自在感和自卑感，尤其是在与他人比较时更突出。表现为人际交往中的自卑、心神不安、消极期待等。\n得分范围0-36分。得分在18分以上，表明个体人际关系较为敏感，人际交往中自卑感较强，并伴有行为症状（如坐立不安，退缩等）。得分在9分以下，表明个体在人际关系上较为正常。总的说来，得分越高，个体在人际交往中表现的问题就越多，自卑，自我中心越突出，并已表现出消极的期待。得分越低，个体在人际关系上越能应付自如，人际交流自信、胸有成竹，并抱有积极的期待。" },
        dep: { name: "抑郁", count: 13, max: 52, crit: 26, fullDesc: "以苦闷的心境为代表性症状，还表现为生活兴趣减退、动力缺乏、活力丧失、失望、悲观，以及有关死亡的思想。\n得分范围0-52分。得分在26分以上，表明个体的抑郁程度较强，生活缺乏足够的兴趣，缺乏运动活力，极端情况下，可能会有想死亡的思想和自杀的观念。得分在13分以下，表明个体抑郁程度较弱，生活态度乐观积极，充满活力，心境愉快。总的说来，得分越高，抑郁程度越明显，得分越低，抑郁程度越不明显。" },
        anx: { name: "焦虑", count: 10, max: 40, crit: 20, fullDesc: "一般指烦躁、坐立不安、神经过敏、紧张以及由此产生的躯体征象（如震颤）。\n得分范围0-40分。得分在20分以上，表明个体较易焦虑，易表现出烦躁、不安静和神经过敏，极端时可能导致惊恐发作。得分在10分以下，表明个体不易焦虑，易表现出安定的状态。总的说来，得分越高，焦虑表现越明显。得分越低，越不会导致焦虑。" },
        hos: { name: "敌对", count: 6, max: 24, crit: 12, fullDesc: "从思想、感情及行为三方面反映敌对表现，包括厌烦、摔物、争论直至不可控制的脾气爆发。\n得分范围0-24分。得分在12分以上，表明个体易表现出敌对的思想、情感和行为。得分在6分以下表明个体容易表现出友好的思想、情感和行为。总的说来，得分越高，个体越容易敌对，好争论，脾气难以控制。得分越低，个体的脾气越温和，待人友好，不喜欢争论、无破坏行为。" },
        pho: { name: "恐怖", count: 7, max: 28, crit: 14, fullDesc: "恐惧对象包括出门旅行、空旷场地、人群、公共场所以及社交恐怖。\n得分范围0-28分。得分在14分以上，表明个体恐怖症状较为明显，常表现出社交、广场和人群恐惧，得分在7分以下，表明个体的恐怖症状不明显。总的说来，得分越高，个体越容易对一些场所和物体发生恐惧，并伴有明显的躯体症状。得分越低，个体越不易产生恐怖心理，越能正常的交往和活动。" },
        par: { name: "偏执", count: 6, max: 24, crit: 12, fullDesc: "主要指猜疑、关系妄想、投射性思维、敌对、被动体验和夸大等。\n得分范围0-24分。得分在12分以上，表明个体的偏执症状明显，较易猜疑和敌对，得分在6分以下，表明个体的偏执症状不明显。总的说来，得分越高，个体越易偏执，表现出投射性的思维和妄想，得分越低，个体思维越不易走极端。" },
        psy: { name: "精神病性", count: 10, max: 40, crit: 20, fullDesc: "反映各式各样的急性症状和行为，包括幻听、思维播散、被洞悉感等精神分裂样症状。\n得分范围0-40分。得分在20分以上，表明个体的精神病性症状较为明显，得分在10分以下，表明个体的精神病性症状不明显。总的说来，得分越高，越多的表现出精神病性症状和行为。得分越低，就越少表现出这些症状和行为。" },
        oth: { name: "其他 (睡眠/饮食)", count: 7, max: 28, crit: 14, fullDesc: "主要反映睡眠及饮食情况。得分范围0-28分。得分在14分以上，表明个体睡眠饮食问题较明显，得分在7分以下，表明个体睡眠饮食问题不明显。得分越高，睡眠饮食问题越突出。" }
    };

    let scores = new Array(90).fill(null);
    let currentIndex = 0;

    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');
    const detailView = document.getElementById('detailView');
    const qNumDiv = document.getElementById('qNum');
    const qTextDiv = document.getElementById('qText');
    const optionGrid = document.getElementById('optionGrid');
    const progressFill = document.getElementById('progressFill');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const backToResultBtn = document.getElementById('backToResultBtn');
    const backToResultFromDetailBtn = document.getElementById('backToResultFromDetailBtn');
    const resultGrid = document.getElementById('resultGrid');
    const globalStatsResult = document.getElementById('globalStatsResult');
    const resultDatetime = document.getElementById('resultDatetime'); // 新增
    const detailFactorName = document.getElementById('detailFactorName');
    const detailSub = document.getElementById('detailSub');
    const detailDescription = document.getElementById('detailDescription');
    const detailScoreBox = document.getElementById('detailScoreBox');
    const levelDescription = document.getElementById('levelDescription');
    const captureBtn = document.getElementById('captureResultBtn');

    function countAnswered() { return scores.filter(v => v !== null).length; }
    function updateProgress() { progressFill.style.width = (countAnswered() / 90 * 100) + '%'; }
    function isAllAnswered() { return scores.every(v => v !== null); }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        if (currentIndex === 89) nextBtn.disabled = (scores[currentIndex] === null);
        else nextBtn.disabled = (scores[currentIndex] === null);
    }

    function renderCurrent() {
        if (currentIndex >= 90) return;
        const item = items[currentIndex];
        qNumDiv.innerText = `第 ${item.num} / 90`;
        qTextDiv.innerText = item.text;
        const labels = ['没有', '很轻', '中等', '偏重', '严重'];
        const letters = ['A', 'B', 'C', 'D', 'E'];
        let html = '';
        for (let val = 0; val <= 4; val++) {
            const selectedClass = (scores[currentIndex] === val) ? 'selected' : '';
            html += `<div class="option-btn ${selectedClass}" data-value="${val}"><span class="option-marker">${letters[val]}</span><span class="option-text">${labels[val]}</span></div>`;
        }
        optionGrid.innerHTML = html;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const value = parseInt(this.dataset.value, 10);
                scores[currentIndex] = value;
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                updateProgress();
                if (!isAllAnswered() && currentIndex < 89) { currentIndex++; renderCurrent(); }
                else if (isAllAnswered()) showResultView();
                updateNavButtons();
            });
        });
        updateNavButtons();
    }

    function goPrev() { if (currentIndex > 0) { currentIndex--; renderCurrent(); } }
    function goNext() {
        if (scores[currentIndex] === null) return;
        if (currentIndex < 89) { currentIndex++; renderCurrent(); }
        else if (currentIndex === 89) showResultView();
    }

    function computeResults() {
        const sums = { som:0, obs:0, int:0, dep:0, anx:0, hos:0, pho:0, par:0, psy:0, oth:0 };
        items.forEach((item, idx) => sums[item.factor] += scores[idx]);
        const totalScore = scores.reduce((a,b) => a + b, 0);
        const positiveItems = scores.filter(s => s >= 1).length;
        const negativeItems = 90 - positiveItems;
        const positiveAvg = positiveItems ? (scores.filter(s => s >= 1).reduce((a,b)=>a+b,0) / positiveItems).toFixed(2) : 0;
        return { sums, totalScore, positiveItems, negativeItems, positiveAvg };
    }

    function showResultView() {
        const { sums, totalScore, positiveItems, negativeItems, positiveAvg } = computeResults();
        const detailLines = Object.entries(factorMeta).map(([key, meta]) => {
            const raw = sums[key];
            const mean = (raw / meta.count).toFixed(2);
            const level = raw >= meta.crit ? '达到临界值' : raw >= meta.crit / 2 ? '中间区间' : '较低区间';
            return `${meta.name}：${raw}分，均分${mean}，${level}（临界值≥${meta.crit}）`;
        });
        detailLines.unshift(`总分${totalScore}；总指数${(totalScore/90).toFixed(2)}；阳性项目${positiveItems}；阴性项目${negativeItems}；阳性均分${positiveAvg}`);
        try {
            let records = JSON.parse(sessionStorage.getItem('psyhealth-session-results') || '[]');
            const record = { id:'legacy-psy90', shortTitle:'PsyHealth90自测量表', resultTitle:'总分 ' + totalScore, score:(totalScore/90).toFixed(2), scoreLabel:'总指数', summary:`阳性项目：${positiveItems}；阴性项目：${negativeItems}；阳性均分：${positiveAvg}`, details:detailLines, completedAt:new Date().toISOString() };
            records = records.filter(item => item.id !== record.id); records.push(record); sessionStorage.setItem('psyhealth-session-results', JSON.stringify(records));
        } catch (error) {}
        let gridHtml = '';
        for (let [key, meta] of Object.entries(factorMeta)) {
            const raw = sums[key];
            const mean = (raw / meta.count).toFixed(2);
            const percent = (raw / meta.max) * 100;
            const level = raw >= meta.crit ? '达到临界值' : raw >= meta.crit / 2 ? '中间区间' : '较低区间';
            gridHtml += `<div class="factor-card" data-factor="${key}"><div class="factor-header"><span>${meta.name}</span> <span>${raw}</span></div><div class="factor-bar"><div class="factor-fill" style="width:${percent}%;"></div></div><div class="factor-score">均分${mean} / ${level} / 临界≥${meta.crit}</div></div>`;
        }
        resultGrid.innerHTML = gridHtml;
        globalStatsResult.innerHTML = `<div>📊 总分: ${totalScore}</div><div>📌 总指数: ${(totalScore/90).toFixed(2)}</div><div>🔹 阳性项目: ${positiveItems}</div><div>🔸 阴性项目: ${negativeItems}</div><div>📈 阳性均分: ${positiveAvg}</div>`;
        
        // 设置评测日期时间
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        resultDatetime.innerText = `📅 评测时间：${year}-${month}-${day} ${hours}:${minutes}`;

        document.querySelectorAll('.factor-card').forEach(card => {
            card.addEventListener('click', (e) => showDetailView(card.dataset.factor, sums));
        });
        quizView.classList.remove('active');
        resultView.classList.add('active');
    }

    function showDetailView(factorKey, sums) {
        const meta = factorMeta[factorKey];
        const raw = sums[factorKey];
        const mean = (raw / meta.count).toFixed(2);
        const percent = (raw / meta.max) * 100;
        const lowBound = Math.floor(meta.crit / 2);
        detailFactorName.innerText = meta.name;
        detailSub.innerText = `得分 ${raw}  ·  临界值 ≥ ${meta.crit}`;
        detailDescription.innerText = meta.fullDesc;
        detailScoreBox.innerHTML = `<div style="font-weight:600; margin-bottom:8px;">您的得分详情</div><div>因子总分: ${raw} (满分 ${meta.max})</div><div>条目均分: ${mean}</div><div>超过临界: ${raw >= meta.crit ? '是 ⚠️' : '否'}</div><div class="factor-bar" style="margin-top:12px;"><div class="factor-fill" style="width:${percent}%;"></div></div>`;
        let levelHtml = '<div style="font-weight:600; margin-bottom:10px;">📊 得分区间解读</div>';
        levelHtml += `<div class="level-item">🔹 得分 ≤ ${lowBound-1} ：${meta.name}症状不明显，表现良好。</div>`;
        levelHtml += `<div class="level-item">🔸 得分 ${lowBound}–${meta.crit-1} ：存在轻度到中度症状，可关注。</div>`;
        levelHtml += `<div class="level-item">🔺 得分 ≥ ${meta.crit} ：症状明显，建议进一步关注或咨询。</div>`;
        if (raw < lowBound) levelHtml = levelHtml.replace('🔹', '▶ 您的得分处于该区间');
        else if (raw < meta.crit) levelHtml = levelHtml.replace('🔸', '▶ 您的得分处于该区间');
        else levelHtml = levelHtml.replace('🔺', '▶ 您的得分处于该区间');
        levelDescription.innerHTML = levelHtml;
        resultView.classList.remove('active');
        detailView.classList.add('active');
    }

    function backToResult() { detailView.classList.remove('active'); resultView.classList.add('active'); showResultView(); }
    function captureResult() {
        const element = document.getElementById('resultCapture');
        if (!element) return;
        html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'PsyHealth自测量表结果.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(error => alert('截图生成失败，请重试。' + error));
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    backToResultBtn.addEventListener('click', backToResult);
    backToResultFromDetailBtn.addEventListener('click', backToResult);
    captureBtn.addEventListener('click', captureResult);
    renderCurrent();
    updateProgress();
})();
</script>
</body>
</html>
