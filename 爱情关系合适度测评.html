<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>爱情合适度 · 逐题测评</title>
    <!-- html2canvas 截图库 -->
    <script src="html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #f3ede8;
        }
        #app {
            height: 100dvh;                /* 动态视口，避开地址栏 */
            width: 100%;
            max-width: 450px;               /* 居中类卡片风格 */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: #fffcf9;
            box-shadow: 0 0 30px rgba(140, 100, 70, 0.1);
            position: relative;
        }
        /* 顶部题号/状态栏 */
        .top-bar {
            flex-shrink: 0;
            min-height: calc(54px + env(safe-area-inset-top, 0px));
            padding: max(10px, env(safe-area-inset-top)) 112px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #b27a5a;
            text-align: center;
            letter-spacing: 0.5px;
            background: #fffaf3;
            border-bottom: 1px solid #f0dfd1;
        }
        /* 主内容区：填满剩余高度，用于垂直居中 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            min-height: 0;                  /* flex 溢出控制 */
        }
        /* 题目卡片：固定高度确保每页视觉一致，垂直居中文本 */
        .question-card {
            width: 100%;
            height: 200px;                   /* 固定高度，行数变化不会跳动 */
            background: #fff5ec;
            border-radius: 40px 16px 40px 16px;
            border: 2px solid #f2d9c8;
            box-shadow: 0 12px 24px -8px rgba(150, 100, 70, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 21px;
            font-weight: 520;
            line-height: 1.45;
            color: #3e2c1f;
            text-align: center;
            word-break: break-word;
            max-width: 340px;
            letter-spacing: -0.2px;
        }
        /* 选项按钮行 */
        .options-row {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            width: 100%;
            margin: 16px 0 20px;
            padding: 0 4px;
        }
        .option-btn {
            flex: 1;
            max-width: 100px;
            background: #ffffff;
            border: 2.5px solid #dbbca5;
            font-size: 24px;
            font-weight: 600;
            padding: 16px 0;
            border-radius: 60px;
            color: #7a5842;
            box-shadow: 0 5px 0 #c9ab95;
            text-align: center;
            cursor: pointer;
            transition: all 0.06s linear;
            background: #fefaf7;
            line-height: 1;
        }
        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c9ab95;
            background: #f2dfd2;
            border-color: #b58f74;
            color: #4d3629;
        }
        /* ------------- 结果页样式 (可滚动，但保留全屏结构) ----------- */
        .result-container {
            flex: 1;
            overflow-y: auto;                /* 内容较多时允许滑动 */
            padding: 16px 20px 8px;
            background: #fffbf8;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        /* 截图目标区域（包含所有结果卡片） */
        #resultCapture {
            background: #fffbf8;
            border-radius: 32px 32px 16px 16px;
        }
        .home-floating { position: fixed; top: max(10px,env(safe-area-inset-top)); left: 14px; z-index: 30; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.94); color: #9b6041; text-decoration: none; font-size: .82rem; font-weight: 700; box-shadow: 0 4px 14px rgba(90,45,25,.14); }
        .result-card {
            background: #fff3ea;
            border-radius: 36px 16px 36px 16px;
            padding: 24px 18px 20px;
            border: 2px solid #fad6bf;
            box-shadow: 0 12px 24px rgba(170, 120, 80, 0.12);
            margin-bottom: 20px;
        }
        .result-title {
            font-size: 25px;
            font-weight: 700;
            color: #673f2a;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .score-group {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 16px 16px;
            margin-bottom: 14px;
            border: 1px solid #f5cfba;
        }
        .group-head {
            font-size: 19px;
            font-weight: 700;
            color: #845d45;
            border-left: 7px solid #cb9a7a;
            padding-left: 14px;
            margin-bottom: 12px;
        }
        .score-line {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin: 10px 8px;
            color: #3d2c1e;
            align-items: center;
        }
        .score-badge {
            background: #c39477;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 17px;
        }
        .total-area {
            background: #ab7f64;
            border-radius: 40px;
            padding: 18px 14px;
            margin: 16px 0 14px;
            text-align: center;
            box-shadow: inset 0 -3px 0 #6f4f3b;
        }
        .total-score {
            font-size: 30px;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }
        .total-verdict {
            font-size: 22px;
            font-weight: 700;
            color: #ffefe3;
            margin-top: 6px;
        }
        .final-message {
            font-size: 20px;
            font-weight: 600;
            color: #572f1a;
            text-align: center;
            background: #fae5d7;
            padding: 14px 12px;
            border-radius: 60px;
            margin: 14px 0;
        }
        .datetime {
            font-size: 18px;
            color: #6f543f;
            text-align: center;
            background: #f7e3d6;
            padding: 14px 8px;
            border-radius: 50px;
            margin: 10px 0 16px;
            font-weight: 500;
        }
        .capture-btn {
            background: #9e735b;
            border: none;
            color: white;
            font-size: 22px;
            font-weight: 700;
            padding: 20px 18px;
            border-radius: 60px;
            width: 100%;
            margin: 10px 0 8px;
            box-shadow: 0 7px 0 #5f3f2f;
            transition: 0.08s;
            cursor: pointer;
            border: 1px solid #bf9b85;
        }
        .capture-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #5f3f2f;
        }
        .restart-btn {
            background: #ffffff;
            border: 2px solid #b58f74;
            color: #714f39;
            font-size: 20px;
            font-weight: 600;
            padding: 16px;
            border-radius: 60px;
            width: 100%;
            margin-top: 12px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        /* 隐藏滚动条 */
        .result-container::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
        /* 确保卡片高度一致微调 */
        .question-card {
            transition: none;
        }
    </style>
</head>
<body>
    <a class="home-floating" href="index.html" data-html2canvas-ignore="true">← 返回主页</a>
    <div id="app"></div>
    <script>
        (function() {
            // ---------- 题目列表 (完全按照文档顺序) ----------
            const questions = [
                "我真的爱这个人吗？",
                "我与他（她）在一起时是否快乐？",
                "我们一起做事（学习，工作，娱乐）时是否有乐趣？",
                "他（她）让我感到可靠吗？",
                "假如我病了，累了或感到忧虑时，他（她）能关心抚慰我吗？",
                "我从心里信任他（她）吗？",
                "他（她）是否有什么性格上的东西让我感到惶惶不安或令我不舒服？",
                "他（她）是否有我不喜欢的某些东西？",
                "他（她）是否向我隐藏了什么？",
                "我是否感到他（她）在爱我，但希望我有些地方要改一改？",
                "我之所以要选这个人是因为我觉得应如此选择？",
                "我觉得双方信仰一致是很重要的？",
                "我们父母双方的文化水平很一致？",
                "我们父母双方结婚结构（平等，父做主，母做主）一样？",
                "我们对赚钱和消费的看法是否一致？",
                "我们的娱乐方式是否一致？",
                "我们对读书、学习的看法是否一致？",
                "我们的工作态度和计划是否相似？",
                "我们在抚养、教育孩子方面看法是否接近？",
                "我们对性的态度是否相似？",
                "如果我与他（她）的信仰价值观不一样，是否能共同生活？",
                "与其他人相比，我是否更愿意和他（她）在一起？",
                "他（她）是否最喜欢和我在一起？",
                "如果他（她）病了，我能照料他（她）吗？",
                "如果他（她）疲倦了，我能帮助他（她）吗？",
                "如果他（她）情绪不好，我能安慰他（她）吗？",
                "如果他（她）依赖性强，我能接受吗？",
                "如果他（她）行为专横，我能接纳或控制吗？",
                "父母赞同我们的结合吗？",
                "他（她）是个负责任的人吗？",
                "大多数时候我们是否和谐相处？",
                "我们能否一起相互促进？",
                "我们能否妥善处理彼此间的分歧？",
                "他（她）能否遵守协议或信守诺言？",
                "我们能否很好的交流思想和感情？",
                "我们能否都愿意为爱情承担义务？",
                "我是否感到对方接受了我？",
                "我是否接受了对方真实的自我？",
                "我是否很了解对方？",
                "对方是否很了解我？"
            ];

            const TOTAL = 40;
            let answers = new Array(TOTAL).fill(null);      // 存储 '是'/'否'/'也许'
            let currentIdx = 0;                               // 0~39 题目页, 40表示结果页

            const app = document.getElementById('app');

            // ---------- 工具函数：分组计分 ----------
            function getScore(qIndex, answer) {
                if (!answer) return 0;
                if (qIndex >= 0 && qIndex <= 10) {          // 1-11题
                    return answer === '是' ? 3 : (answer === '也许' ? 2 : 1);
                } else if (qIndex >= 11 && qIndex <= 28) {   // 12-29题
                    return answer === '是' ? 2 : (answer === '也许' ? 1 : 0);
                } else {                                     // 30-40题
                    return answer === '是' ? 3 : (answer === '也许' ? 2 : 1);
                }
            }

            function calculateResults() {
                let g1 = 0, g2 = 0, g3 = 0;
                for (let i = 0; i < TOTAL; i++) {
                    const ans = answers[i];
                    if (!ans) continue;  // 正常情况下不会
                    if (i <= 10) g1 += getScore(i, ans);
                    else if (i <= 28) g2 += getScore(i, ans);
                    else g3 += getScore(i, ans);
                }
                const total = g1 + g2 + g3;
                return { g1, g2, g3, total };
            }

            // 各组评语
            function evalGroup1(s) {
                if (s >= 26 && s <= 33) return '感觉良好';
                if (s >= 17 && s <= 25) return '感觉一般';
                return '感觉不良';
            }
            function evalGroup2(s) {
                if (s >= 27 && s <= 34) return '价值观很相近';
                if (s >= 18 && s <= 26) return '价值观存在一定差异';
                return '价值观相距甚远';
            }
            function evalGroup3(s) {
                if (s >= 26 && s <= 33) return '理性基础可靠';
                if (s >= 18 && s <= 25) return '理性上比较犹豫';
                return '理性上拒绝这一结合';
            }
            function totalEval(t) {
                if (t >= 80 && t <= 100) return '成功的爱情，应努力赢得它。';
                if (t >= 65 && t <= 79) return '有可能成功，但须加以调整。';
                if (t >= 50 && t <= 64) return '不合适的爱情，前途不佳。';
                return '早日结束，快刀斩乱麻，当断不断，必留后患';
            }
            function relationshipAdvice(total, g1, g2, g3) {
                const low = [
                    ['情感基础', g1, '重点核对彼此的亲近感、欣赏、信任、安全感和相处体验。'],
                    ['价值观契合', g2, '重点讨论生活目标、金钱观、家庭边界、婚恋期待和冲突处理原则。'],
                    ['理性承诺', g3, '重点评估双方是否愿意承担关系责任、面对现实压力并持续投入。']
                ].sort((a,b) => a[1] - b[1])[0];
                const global = total >= 80
                    ? '整体匹配度较高，可继续维护关系中的优势，同时保持真实沟通。'
                    : total >= 65
                        ? '关系具备一定可能性，但需要正视差异并主动调整互动方式。'
                        : total >= 50
                            ? '关系中存在较多不确定或阻碍，建议谨慎评估现实条件与长期相处成本。'
                            : '关系风险较高，建议在安全、尊重和现实评估的基础上慎重决定。';
                return [`关系理解建议：${global}`, `优先讨论维度：${low[0]}（${low[1]}分）。${low[2]}`, '解释说明：本测评用于梳理亲密关系中的主观匹配体验，不用于替代伴侣沟通、咨询访谈或重大关系决策。'];
            }

            // 当前日期时间字符串
            function getNowDateTime() {
                const d = new Date();
                const Y = d.getFullYear();
                const M = String(d.getMonth()+1).padStart(2,'0');
                const D = String(d.getDate()).padStart(2,'0');
                const h = String(d.getHours()).padStart(2,'0');
                const m = String(d.getMinutes()).padStart(2,'0');
                const s = String(d.getSeconds()).padStart(2,'0');
                return `${Y}-${M}-${D} ${h}:${m}:${s}`;
            }

            // ---------- 截图功能 (截取结果卡片区域) ----------
            async function handleCapture() {
                const captureElem = document.getElementById('resultCapture');
                if (!captureElem) return;
                try {
                    const canvas = await html2canvas(captureElem, {
                        scale: 1.8,
                        backgroundColor: '#fffbf8',
                        allowTaint: false,
                        logging: false,
                    });
                    const link = document.createElement('a');
                    link.download = `爱情测评_${getNowDateTime().replace(/:/g,'-')}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) {
                    alert('截图生成失败，可尝试手动截图。');
                }
            }

            // 重新测评
            function restartQuiz() {
                answers = new Array(TOTAL).fill(null);
                currentIdx = 0;
                render();
            }

            // ---------- 选项点击处理 ----------
            function onOptionClick(option) {
                if (currentIdx < TOTAL) {
                    answers[currentIdx] = option;
                    if (currentIdx === TOTAL - 1) {
                        currentIdx = 40;      // 进入结果页
                    } else {
                        currentIdx++;
                    }
                    render();
                }
            }

            // ---------- 渲染题目页 ----------
            function renderQuestion() {
                const q = questions[currentIdx];
                const num = currentIdx + 1;
                const html = `
                    <div class="top-bar">第 ${num} / ${TOTAL} 题 · 爱情合适度</div>
                    <div class="main-content">
                        <div class="question-card">
                            <div class="question-text">${q}</div>
                        </div>
                        <div class="options-row">
                            <div class="option-btn" data-opt="是">是</div>
                            <div class="option-btn" data-opt="也许">也许</div>
                            <div class="option-btn" data-opt="否">否</div>
                        </div>
                    </div>
                `;
                app.innerHTML = html;
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const opt = e.currentTarget.dataset.opt;  // '是'/'也许'/'否'
                        onOptionClick(opt);
                    });
                });
            }

            // ---------- 渲染结果页 ----------
            function renderResult() {
                const { g1, g2, g3, total } = calculateResults();
                const eval1 = evalGroup1(g1);
                const eval2 = evalGroup2(g2);
                const eval3 = evalGroup3(g3);
                const finalMsg = totalEval(total);
                const advice = relationshipAdvice(total, g1, g2, g3);
                const dateTime = getNowDateTime();
                try {
                    let records = JSON.parse(sessionStorage.getItem('psyhealth-session-results') || '[]');
                    const details = [`总体评价：${finalMsg}`, ...advice, `情感基础：${g1}分（${eval1}）`,`价值观契合：${g2}分（${eval2}）`,`理性承诺：${g3}分（${eval3}）`,`总分：${total}分`];
                    const record = { id:'legacy-love40', shortTitle:'爱情关系合适度测评', resultTitle:finalMsg, score:total, scoreLabel:'总分', summary:details.join('；'), details, completedAt:new Date().toISOString() };
                    window.PsyHealthStorage.saveResult(record);
                } catch (error) {}

                const html = `
                    <div class="top-bar" style="background:#fcf1e8;">测评报告</div>
                    <div class="result-container">
                        <div id="resultCapture">
                            <div class="result-card">
                                <div class="result-title">💞 合适度解析</div>
                                <div class="score-group">
                                    <div class="group-head">情感基础 (1-11题)</div>
                                    <div class="score-line"><span>得分 ${g1}</span> <span class="score-badge">${eval1}</span></div>
                                </div>
                                <div class="score-group">
                                    <div class="group-head">价值观契合 (12-29题)</div>
                                    <div class="score-line"><span>得分 ${g2}</span> <span class="score-badge">${eval2}</span></div>
                                </div>
                                <div class="score-group">
                                    <div class="group-head">理性承诺 (30-40题)</div>
                                    <div class="score-line"><span>得分 ${g3}</span> <span class="score-badge">${eval3}</span></div>
                                </div>
                                <div class="total-area">
                                    <div class="total-score">总分 ${total}</div>
                                    <div class="total-verdict">${finalMsg}</div>
                                </div>
                                <div class="score-group">
                                    <div class="group-head">关系理解建议</div>
                                    ${advice.map(line => `<div class="score-line"><span>${line}</span></div>`).join('')}
                                </div>
                                <div class="datetime">📅 ${dateTime}</div>
                                <button class="capture-btn" id="captureResultBtn">📸 截图保存结果</button>
                                <button class="restart-btn" id="restartQuizBtn">🔄 重新测评</button>
                            </div>
                        </div>
                    </div>
                `;
                app.innerHTML = html;

                document.getElementById('captureResultBtn').addEventListener('click', handleCapture);
                document.getElementById('restartQuizBtn').addEventListener('click', restartQuiz);
            }

            function render() {
                if (currentIdx < TOTAL) {
                    renderQuestion();
                } else {
                    renderResult();
                }
            }

            // 启动
            render();

            // 确保触摸不会导致页面滚动 (除了结果页内部)
            document.body.addEventListener('touchmove', (e) => {
                if (!e.target.closest('.result-container')) {
                    e.preventDefault();
                }
            }, { passive: false });

        })();
    </script>
    <script src="cloud-config.js?v=20260712f"></script>
    <script src="storage.js?v=20260712f"></script>
    <script src="access-control.js?v=20260712f"></script>
</body>
</html>
