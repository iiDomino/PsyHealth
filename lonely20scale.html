<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>UCLA孤独量表 · 最终版</title>
    <!-- html2canvas 库用于截图 -->
    <script src="html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #eef3f8;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 25px 45px -12px rgba(0,30,60,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px 12px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #11324b;
            border-left: 6px solid #4f7eb3;
            padding-left: 12px;
            flex-shrink: 0;
        }

        /* 测评区域 */
        #quizArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .question-pane {
            background: #f9fcff;
            border-radius: 24px;
            padding: 16px 12px;
            border: 2px solid #c5d9f0;
            box-shadow: inset 0 2px 5px #ffffff, 0 4px 8px -4px #7f9fc0;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: visible;
            margin-bottom: 6px;
        }
        .q-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .q-num {
            background: #1f4970;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            box-shadow: 0 4px 0 #0d2940;
            flex-shrink: 0;
        }
        .q-text {
            font-size: 1.2rem;
            font-weight: 550;
            line-height: 1.3;
            color: #04223b;
            flex: 1;
            min-height: 4.68rem;
            display: flex;
            align-items: flex-start;
            word-break: break-word;
        }
        .option-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0 8px;
            flex-shrink: 0;
        }
        .option-item {
            width: 100%;
            background: #ffffff;
            border-radius: 50px;
            border: 2px solid #bacee6;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #9bb3cf;
        }
        .option-item.selected {
            background: #d9e9ff;
            border-color: #1f4970;
            box-shadow: 0 4px 0 #1f4970;
            transform: scale(1.02);
        }
        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #1f4970;
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }
        .option-item input[type="radio"]:checked {
            background: #1f4970;
            border-color: #1f4970;
            box-shadow: inset 0 0 0 5px white;
        }
        .option-item label {
            font-size: 1rem;
            font-weight: 550;
            color: #0a2a44;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .progress-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 4px 0 2px;
            font-weight: 500;
            color: #1d3f5c;
            flex-shrink: 0;
        }
        .progress-badge {
            background: #deeaf5;
            padding: 4px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 4px 0 0;
            flex-shrink: 0;
        }
        .btn {
            background: white;
            border: 2px solid #1f4970;
            color: #1f4970;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.12s;
            box-shadow: 0 4px 0 #b0c7e0;
            flex: 1 1 auto;
            min-width: 100px;
        }
        .btn-primary {
            background: #1f4970;
            color: white;
            border: 2px solid #123456;
            box-shadow: 0 4px 0 #0b263b;
        }
        .btn-primary:hover {
            background: #123b5b;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #9bb3cf;
        }
        .btn:disabled {
            opacity: 0.35;
            transform: none;
            box-shadow: 0 4px 0 #b0c7e0;
            pointer-events: none;
        }

        /* 结果区域 */
        #resultArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .result-card {
            background: linear-gradient(145deg, #e8f0fe, #ffffff);
            border-radius: 32px;
            padding: 22px 20px;
            border: 3px solid #bbd2e9;
            box-shadow: 0 8px 0 #7e9fc7;
            flex: 1;
            overflow-y: auto;
            margin-bottom: 4px;
        }
        .result-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0a2942;
            margin-bottom: 6px;
        }
        .datetime {
            font-size: 0.8rem;
            color: #2b4e72;
            background: #dde9f5;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .main-score {
            display: flex;
            align-items: baseline;
            gap: 8px 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .total-score {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: #1f4970;
            background: #dbeafe;
            padding: 0px 14px;
            border-radius: 70px;
        }
        .level-badge {
            font-size: 1.3rem;
            font-weight: 600;
            background: #2d5e2c;
            color: white;
            padding: 5px 20px;
            border-radius: 60px;
            box-shadow: 0 5px 0 #1b3e1a;
        }
        .grade-reference {
            background: #e2ecf9;
            border-radius: 24px;
            padding: 14px 14px;
            margin: 15px 0 12px;
            font-size: 0.9rem;
            border: 2px dashed #4f7eb3;
        }
        .grade-reference h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #11324b;
        }
        .grade-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px 10px;
            justify-content: space-between;
        }
        .grade-item {
            background: white;
            border-radius: 40px;
            padding: 4px 12px;
            border: 1px solid #8ba9cc;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .desc-text {
            font-size: 0.95rem;
            line-height: 1.4;
            background: #ffffffd6;
            border-radius: 28px;
            padding: 14px 16px;
            border: 1px solid #abc0d6;
        }

        .scroll-hint {
            text-align: center;
            font-size: 0.75rem;
            color: #6b7f96;
            margin: 2px 0 4px;
            opacity: 0.7;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        /* 结果页按钮组：使两个按钮宽度相等、文字不换行 */
        .result-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 0 0 3px;
            flex-shrink: 0;
        }
        .result-buttons .btn {
            flex: 1 1 0;           /* 均分剩余空间，宽度相等 */
            min-width: 0;           /* 允许缩小 */
            white-space: nowrap;    /* 强制单行，高度一致 */
        }
        .btn-retest {
            background: #6b4f3c;
            border: 2px solid #4f3b2c;
            color: white;
            box-shadow: 0 4px 0 #3e2e22;
        }
        .btn-retest:hover {
            background: #543f2f;
        }

        .hidden {
            display: none !important;
        }

        .footer-note {
            font-size: 0.65rem;
            color: #6b7f96;
            text-align: center;
            border-top: 1px solid #ccd9e9;
            padding-top: 6px;
            margin-top: 3px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>UCLA孤独量表</h1>

    <div id="quizArea">
        <div class="question-pane" id="questionPane">
            <div class="q-header">
                <span class="q-num" id="currentQNum">1</span>
                <span class="q-text" id="currentQText">加载中...</span>
            </div>
            <div class="option-grid" id="optionGroup"></div>
            <div class="progress-area">
                <span class="progress-badge" id="progressText">第 1 / 20 题</span>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn" id="prevBtn" disabled>◀ 上一题</button>
            <button class="btn" id="nextBtn">下一题 ▶</button>
        </div>
    </div>

    <div id="resultArea" class="hidden">
        <div class="result-card" id="resultCard">
            <div class="result-title">📊 你的孤独测评结果</div>
            <div class="datetime">测评时间：<span id="assessmentDatetime"></span> · 开发者：DOMINO</div>
            <div class="main-score">
                <span class="total-score" id="finalScore">--</span>
                <span class="level-badge" id="finalLevel">---</span>
            </div>
            <div class="grade-reference">
                <h3>📌 孤独分级标准</h3>
                <div class="grade-grid">
                    <span class="grade-item">≥45 高度</span>
                    <span class="grade-item">39–44 中等偏高</span>
                    <span class="grade-item">34–38 中等</span>
                    <span class="grade-item">28–33 中等偏下</span>
                    <span class="grade-item">20–27 低度</span>
                </div>
            </div>
            <div class="desc-text" id="finalDescription"></div>
        </div>
        <div class="scroll-hint">⬆️ 向上滑动查看更多</div>
        <div class="result-buttons">
            <button class="btn btn-retest" id="retestBtn">🔄 重新测评</button>
            <button class="btn btn-primary" id="screenshotBtn">点击保存</button>
        </div>
    </div>

    <div class="footer-note">
        UCLA孤独量表第三版 · 开发者：DOMINO
    </div>
</div>

<script>
    (function() {
        const questions = [
            { num: 1,  text: "你常感到与周围人关系和谐吗？" },
            { num: 2,  text: "你常感到缺少伙伴吗？" },
            { num: 3,  text: "你常感到没人可以信赖吗？" },
            { num: 4,  text: "你常感到寂寞吗？" },
            { num: 5,  text: "你常感到属于朋友中的一员吗？" },
            { num: 6,  text: "你常感到与周围人有许多共同点吗？" },
            { num: 7,  text: "你常感到与任何人都不亲密了吗？" },
            { num: 8,  text: "你常感到你的兴趣与想法与周围的人不一样吗？" },
            { num: 9,  text: "你常感到想要与人来往、结交朋友吗？" },
            { num: 10, text: "你常感到与人亲近吗？" },
            { num: 11, text: "你常感到被人冷落吗？" },
            { num: 12, text: "你常感到你与别人的来往毫无意义吗？" },
            { num: 13, text: "你常感到没有人很了解你吗？" },
            { num: 14, text: "你常感到与别人隔开了吗？" },
            { num: 15, text: "你常感到当你愿意时就能找到伙伴吗？" },
            { num: 16, text: "你常感到有人真正的了解你吗？" },
            { num: 17, text: "你常感到羞怯吗？" },
            { num: 18, text: "你常感到人们围着你但并不关心你吗？" },
            { num: 19, text: "你常感到有人愿意与你交谈吗？" },
            { num: 20, text: "你常感到有人值得你信赖吗？" }
        ];

        const reverseItems = [1, 5, 6, 9, 10, 15, 16, 19, 20];

        let currentIndex = 0;
        let answers = new Array(20).fill(null);

        const quizArea = document.getElementById('quizArea');
        const resultArea = document.getElementById('resultArea');
        const qNumSpan = document.getElementById('currentQNum');
        const qTextSpan = document.getElementById('currentQText');
        const optionGroup = document.getElementById('optionGroup');
        const progressText = document.getElementById('progressText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resultCard = document.getElementById('resultCard');
        const screenshotBtn = document.getElementById('screenshotBtn');
        const retestBtn = document.getElementById('retestBtn');
        const assessmentDatetime = document.getElementById('assessmentDatetime');
        const finalScore = document.getElementById('finalScore');
        const finalLevel = document.getElementById('finalLevel');
        const finalDescription = document.getElementById('finalDescription');

        function updateMeta() {
            progressText.innerText = `第 ${currentIndex+1} / 20 题`;
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === 19);
        }

        function renderCurrentQuestion() {
            const q = questions[currentIndex];
            qNumSpan.innerText = q.num;
            qTextSpan.innerText = q.text;

            const selectedValue = answers[currentIndex];
            const optionLabels = ['从不', '很少', '有时', '一直'];
            let htmlStr = '';
            for (let val = 1; val <= 4; val++) {
                const checkedAttr = (selectedValue === val) ? 'checked' : '';
                htmlStr += `
                    <div class="option-item ${selectedValue === val ? 'selected' : ''}">
                        <input type="radio" name="currentQ" value="${val}" id="opt_${val}" ${checkedAttr}>
                        <label for="opt_${val}">${optionLabels[val-1]}</label>
                    </div>
                `;
            }
            optionGroup.innerHTML = htmlStr;

            const radios = document.querySelectorAll('input[name="currentQ"]');
            radios.forEach(radio => {
                radio.addEventListener('change', function(e) {
                    const newVal = parseInt(e.target.value, 10);
                    answers[currentIndex] = newVal;

                    document.querySelectorAll('.option-item').forEach(item => {
                        item.classList.remove('selected');
                    });
                    e.target.closest('.option-item').classList.add('selected');

                    if (currentIndex < 19) {
                        currentIndex++;
                        renderCurrentQuestion();
                    } else {
                        showResult();
                    }
                });
            });

            updateMeta();
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentQuestion();
            }
        }

        function goNext() {
            if (currentIndex < 19) {
                currentIndex++;
                renderCurrentQuestion();
            }
        }

        function computeTotal() {
            let total = 0;
            for (let i = 0; i < 20; i++) {
                const raw = answers[i];
                if (raw === null) continue;
                const qNum = i + 1;
                if (reverseItems.includes(qNum)) {
                    total += (5 - raw);
                } else {
                    total += raw;
                }
            }
            return total;
        }

        function getLevelInfo(score) {
            if (score >= 45) return { level: '高度孤独感', desc: '您经常体验到强烈的孤独感，社交联系可能无法满足内心需要。建议寻求支持或与信任的人谈谈。' };
            if (score >= 39) return { level: '中等偏高孤独感', desc: '孤独感较为明显，很多时候会感到孤立。主动参与社交或倾诉可能会改善。' };
            if (score >= 34) return { level: '中等孤独', desc: '有时会感到孤独，但并非持续。可以留意哪些情境下孤独感增强。' };
            if (score >= 28) return { level: '中等偏下孤独感', desc: '总体孤独感不强，大部分时间人际关系良好。' };
            return { level: '低度孤独感', desc: '孤独感很低，您在生活中常感到与他人相处融洽。' };
        }

        function showResult() {
            const missing = answers.findIndex(a => a === null);
            if (missing !== -1) {
                alert(`您还有第 ${missing+1} 题未回答。请完成所有题目后查看结果。`);
                currentIndex = missing;
                renderCurrentQuestion();
                return;
            }

            const total = computeTotal();
            const levelInfo = getLevelInfo(total);
            try {
                let records = JSON.parse(sessionStorage.getItem('psyhealth-session-results') || '[]');
                const record = { id:'legacy-lonely20', shortTitle:'lonely20scale.html', resultTitle:levelInfo.level, score:total, scoreLabel:'总分', summary:`孤独感总分：${total}；结果：${levelInfo.level}`, completedAt:new Date().toISOString() };
                records = records.filter(item => item.id !== record.id); records.push(record); sessionStorage.setItem('psyhealth-session-results', JSON.stringify(records));
            } catch (error) {}

            finalScore.innerText = total;
            finalLevel.innerText = levelInfo.level;
            finalDescription.innerText = levelInfo.desc;

            const now = new Date();
            const formatted = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            assessmentDatetime.innerText = formatted;

            quizArea.classList.add('hidden');
            resultArea.classList.remove('hidden');
        }

        function resetAll() {
            answers = new Array(20).fill(null);
            currentIndex = 0;
            renderCurrentQuestion();
            quizArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
        }

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function captureResultCard() {
            if (resultArea.classList.contains('hidden')) {
                alert('请先完成测评并显示结果');
                return;
            }

            const originalResultAreaOverflow = resultArea.style.overflow;
            const originalResultAreaHeight = resultArea.style.height;
            const originalResultCardOverflow = resultCard.style.overflow;
            const originalResultCardHeight = resultCard.style.height;

            resultArea.style.overflow = 'visible';
            resultArea.style.height = 'auto';
            resultCard.style.overflow = 'visible';
            resultCard.style.height = 'auto';

            html2canvas(resultCard, {
                scale: 2,
                backgroundColor: '#ffffff',
                allowTaint: false,
                useCORS: true,
                logging: false,
                scrollY: 0,
                windowWidth: document.documentElement.clientWidth
            }).then(canvas => {
                resultArea.style.overflow = originalResultAreaOverflow;
                resultArea.style.height = originalResultAreaHeight;
                resultCard.style.overflow = originalResultCardOverflow;
                resultCard.style.height = originalResultCardHeight;

                const now = new Date();
                const timestamp = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}`;
                downloadCanvas(canvas, `UCLA孤独测评_${timestamp}.png`);
            }).catch(error => {
                resultArea.style.overflow = originalResultAreaOverflow;
                resultArea.style.height = originalResultAreaHeight;
                resultCard.style.overflow = originalResultCardOverflow;
                resultCard.style.height = originalResultCardHeight;
                console.error('截图失败:', error);
                alert('截图生成失败，可稍后重试。');
            });
        }

        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        screenshotBtn.addEventListener('click', captureResultCard);
        retestBtn.addEventListener('click', resetAll);

        renderCurrentQuestion();
    })();
</script>
</body>
</html>
