<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>来访者历史 · PsyHealth</title><link rel="stylesheet" href="styles.css"></head>
<body><main class="app-shell history-shell"><header class="topbar"><a class="home-link" href="index.html">← 返回首页</a><button class="text-button" id="adminLogoutBtn" type="button">退出登录</button></header><section class="panel"><p class="eyebrow">PsyHealth</p><h1 id="centerTitle">管理中心</h1><div id="adminIdentity" class="admin-identity"></div></section><section class="panel admin-section"><h2>来访者结果</h2><p class="muted-copy">列表同时显示进入测试所使用的机构代码。</p><div id="historyApp"></div></section><section class="panel admin-section" id="codeSection"><h2>机构代码</h2><p class="muted-copy">系统自动生成不重复的 6 位数字代码，可分别设置量表权限。</p><div id="inviteAdminApp"></div></section><section class="panel admin-section" id="organizationsSection" hidden><h2>机构用户与使用期限</h2><div id="organizationsApp"></div></section><section class="panel admin-section"><h2>修改登录密码</h2><form id="changePasswordForm" class="compact-form"><label class="text-field"><span>新密码</span><input name="password" type="password" minlength="10" required></label><label class="text-field"><span>再次输入</span><input name="confirmPassword" type="password" minlength="10" required></label><p id="passwordMessage" class="form-message"></p><button class="secondary-btn" type="submit">更新密码</button></form></section></main><script src="cloud-config.js"></script><script src="storage.js"></script><script src="history.js"></script><script src="admin-settings.js"></script></body></html>
