<body><main class="app-shell history-shell"><header class="topbar"><a class="home-link" href="index.html">← 返回首页</a><button class="text-button" id="adminLogoutBtn" type="button">退出登录</button></header><section class="panel"><p class="eyebrow">心理测试工具</p><h1 id="centerTitle">管理中心</h1><div id="adminIdentity" class="admin-identity"></div></section><section class="panel admin-section"><h2>来访者档案数据</h2><p class="muted-copy">按来访者姓名建立独立档案，集中查看基本信息、多次测评结果、趋势分析、来访者留言和机构工作日志。</p><a class="primary-btn button-link" href="clients.html">进入来访者档案数据</a></section><section class="panel admin-section"><h2>单次测评记录</h2><p class="muted-copy">兼容旧数据的单次记录列表。新业务建议优先使用“来访者档案数据”。</p><div id="historyApp"></div></section><section class="panel admin-section" id="codeSection"><h2>机构代码</h2><p class="muted-copy">每个机构最多设置 3 组代码，并可分别设置量表权限。</p><div id="inviteAdminApp"></div></section><section class="panel admin-section" id="organizationsSection" hidden><h2>机构用户与使用期限</h2><p class="muted-copy">可手动设置机构账号到期日；到期后自动暂停使用，也可随时直接停止机构。</p><div id="organizationsApp"></div></section><section class="panel admin-section"><h2 id="passwordSectionTitle">修改登录密码</h2><form id="changePasswordForm" class="compact-form"><label class="text-field"><span>新密码</span><input name="password" type="password" minlength="8" required></label><label class="text-field"><span>再次输入</span><input name="confirmPassword" type="password" minlength="8" required></label><p id="passwordMessage" class="form-message"></p><button class="secondary-btn" type="submit">更新密码</button></form></section></main><footer class="site-contact">客服微信号：iiDomino <span class="site-legal"><a href="privacy-policy.html">隐私政策</a><a href="terms.html">用户协议</a></span></footer><script src="cloud-config.js?v=20260711e"></script><script src="storage.js?v=20260711e"></script><script src="history.js?v=20260711e"></script><script src="admin-settings.js?v=20260711e"></script></body></html>
