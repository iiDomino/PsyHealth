<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>受测者历史 · PsyHealth</title><link rel="stylesheet" href="styles.css"></head>
<body><main class="app-shell history-shell"><header class="topbar"><a class="home-link" href="intake.html">← 返回受试者入口</a><button class="text-button" id="adminLogoutBtn" type="button">退出登录</button></header><section class="panel"><p class="eyebrow">PsyHealth 管理中心</p><h1>受测者与权限管理</h1><p class="lead">查看跨设备评测记录，并管理邀请码和管理员密码。</p><div id="adminIdentity" class="admin-identity"></div></section><section class="panel admin-section"><h2>以往受测者</h2><p class="muted-copy">按咨询提交时间排列，勾选记录后可批量删除。</p><div id="historyApp"></div></section><section class="panel admin-section"><h2>受试者邀请码</h2><p class="muted-copy">邀请码及开放量表范围只保存在服务器。</p><div id="inviteAdminApp"></div></section><section class="panel admin-section"><h2>修改管理员密码</h2><form id="changePasswordForm" class="compact-form"><label class="text-field"><span>新密码</span><input name="password" type="password" minlength="10" autocomplete="new-password" required></label><label class="text-field"><span>再次输入新密码</span><input name="confirmPassword" type="password" minlength="10" autocomplete="new-password" required></label><p id="passwordMessage" class="form-message" role="status"></p><button class="secondary-btn" type="submit">更新管理员密码</button></form></section></main><script src="cloud-config.js"></script><script src="storage.js"></script><script src="history.js"></script><script src="admin-settings.js"></script></body></html>
