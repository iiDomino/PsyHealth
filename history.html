<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>来访者历史 · 心理测试工具</title><link rel="stylesheet" href="styles.css"></head>
<body><main class="app-shell history-shell"><header class="topbar"><a class="home-link" href="index.html">← 返回首页</a><button class="text-button" id="adminLogoutBtn" type="button">退出登录</button></header><section class="panel"><p class="eyebrow">心理测试工具</p><h1 id="centerTitle">管理中心</h1><div id="adminIdentity" class="admin-identity"></div></section><section class="panel admin-section"><h2>来访者测评结果</h2><p class="muted-copy">系统管理员可查看所有机构的全部来访者信息、进入机构及每项测评详情，并可勾选删除。</p><div id="historyApp"></div></section><section class="panel admin-section" id="codeSection"><h2>机构代码</h2><p class="muted-copy">每个机构最多设置 3 组代码，并可分别设置量表权限。</p><div id="inviteAdminApp"></div></section><section class="panel admin-section" id="organizationsSection" hidden><h2>机构用户与使用期限</h2><p class="muted-copy">授权时间可累计；到期后自动暂停使用，也可随时直接停止机构。</p><div id="organizationsApp"></div></section><section class="panel admin-section"><h2 id="passwordSectionTitle">修改登录密码</h2><form id="changePasswordForm" class="compact-form"><label class="text-field"><span>新密码</span><input name="password" type="password" minlength="8" required></label><label class="text-field"><span>再次输入</span><input name="confirmPassword" type="password" minlength="8" required></label><p id="passwordMessage" class="form-message"></p><button class="secondary-btn" type="submit">更新密码</button></form></section></main><script src="cloud-config.js?v=20260710e"></script><script src="storage.js?v=20260710e"></script><script src="history.js?v=20260710e"></script><script src="admin-settings.js?v=20260710e"></script></body></html>
