<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>人格85自测量表</title>
    <!-- 引入 html2canvas 用于截图 -->
    <script src="html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #eef3f7;
            margin: 0;
            padding: 54px 12px max(12px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: flex-start;
            overflow-y: auto;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,30,50,0.2);
            padding: 24px 20px;
            border: 1px solid #cfdeed;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #123a5e;
            letter-spacing: -0.01em;
            border-left: 6px solid #4c8bb8;
            padding-left: 16px;
        }
        .guide {
            background: #f2f8ff;
            border: 1px solid #bdd6ec;
            border-radius: 24px;
            padding: 14px 20px;
            margin-bottom: 24px;
            color: #103f62;
            font-size: 0.94rem;
            box-shadow: 0 4px 8px #d9e6f2;
        }

        /* 单题卡片 */
        .question-card {
            background: #f9fcff;
            border: 2px solid #c7ddf5;
            border-radius: 40px;
            padding: 28px 20px;
            margin: 16px 0 24px;
            box-shadow: 0 20px 30px #d2e3f0;
        }
        .q-num-large {
            font-size: 1.2rem;
            color: #1e6fa5;
            font-weight: 600;
            margin-bottom: 14px;
            background: #e2effb;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
        }
        /* 固定题目区域高度，长题可在区域内滚动，确保选项位置稳定 */
        .q-text-large {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b2b45;
            line-height: 1.4;
            margin-bottom: 25px;
            word-break: break-word;
            overflow-y: auto;
            min-height: calc(1.5rem * 1.4 * 2);
            max-height: calc(1.5rem * 1.4 * 2);
        }
        .options-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 10px;
        }
        .options-row label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #154a73;
            background: #ffffff;
            padding: 14px 36px;
            border-radius: 60px;
            border: 2px solid #aac9e9;
            box-shadow: 0 6px 0 #9bb5d0;
            transition: 0.1s ease;
            cursor: pointer;
        }
        .options-row label:has(input:checked) {
            background: #d1e5ff;
            border-color: #1f6e9e;
            box-shadow: 0 3px 0 #1f6e9e;
            transform: translateY(3px);
        }
        input[type="radio"] {
            width: 22px;
            height: 22px;
            accent-color: #1f6e9e;
        }
        .nav-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }
        .nav-btn {
            background: white;
            border: 2px solid #1f6e9e;
            color: #1f6e9e;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px #c7ddf5;
            min-width: 100px;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            border-color: #a5b8ca;
            color: #7f99b0;
            pointer-events: none;
            box-shadow: none;
        }
        .nav-btn:hover:not(:disabled) {
            background: #1f6e9e;
            color: white;
        }
        .action-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0 5px;
        }
        .reset-btn {
            background: #ffffff;
            border: 2px solid #9bb7d4;
            color: #2f546e;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .reset-btn:hover {
            background: #ecf5fc;
        }

        /* 结果面板 */
        .result-panel {
            background: linear-gradient(145deg, #f0f7fe, #ffffff);
            border-radius: 32px;
            padding: 20px 18px;
            margin-top: 24px;
            border: 2px solid #c7dcf2;
            box-shadow: 0 12px 20px #d2e2f0;
        }
        #captureArea {
            /* 截图区域无额外样式 */
        }
        .scores {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .score-card {
            background: #ffffffd6;
            border-radius: 40px;
            padding: 12px 18px;
            min-width: 120px;
            text-align: center;
            border: 1px solid #9ac2e3;
            box-shadow: 0 4px 10px #bdd2e9;
        }
        .score-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: #103455;
        }
        .score-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1b6ca1;
            line-height: 1.2;
        }
        .datetime-info {
            text-align: center;
            font-size: 1rem;
            color: #2b5f7a;
            margin: 8px 0 16px;
            padding: 8px 16px;
            background: #e1f0fa;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        .interpret {
            background: #e5f0fa;
            border-radius: 24px;
            padding: 18px 20px;
            font-size: 0.98rem;
            color: #01233b;
            border-left: 5px solid #266fa1;
            line-height: 1.5;
        }
        .warning {
            color: #b13e3e;
            font-weight: 600;
            background: #ffeae5;
            border-radius: 30px;
            padding: 8px 16px;
            display: inline-block;
            margin-top: 12px;
        }
        .screenshot-btn {
            background: #2b7a4d;
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b4f32;
            transition: 0.1s;
            border: 1px solid #a3d8b0;
            margin-top: 10px;
        }
        .screenshot-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1b4f32;
        }
        .footnote {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #4d708b;
            text-align: right;
            border-top: 1px dashed #b2cee8;
            padding-top: 14px;
        }
        .hidden {
            display: none !important;
        }
        .home-floating { position: fixed; top: 12px; left: 14px; z-index: 20; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.94); color: #1f618b; text-decoration: none; font-size: .85rem; font-weight: 700; box-shadow: 0 4px 14px rgba(0,45,70,.14); }

        /* 移动端优化 */
        @media (max-width: 600px) {
            body { padding: 54px 8px max(8px, env(safe-area-inset-bottom)); }
            .container { padding: 18px 12px; border-radius: 28px; }
            h1 { font-size: 1.6rem; border-left-width: 4px; padding-left: 12px; }
            .guide { padding: 12px 16px; font-size: 0.9rem; border-radius: 20px; }

            .question-card { padding: 22px 14px; border-radius: 32px; }
            .q-num-large { font-size: 1rem; padding: 5px 16px; }
            .q-text-large { font-size: 1.3rem; margin-bottom: 20px; min-height: calc(1.3rem * 1.4 * 2); }

            .options-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .options-row label { justify-content: center; padding: 14px 20px; font-size: 1.2rem; }

            .nav-panel { gap: 8px; }
            .nav-btn { padding: 8px 16px; min-width: 80px; font-size: 0.95rem; }

            .result-panel { padding: 16px 12px; }
            .scores { gap: 12px; }
            .score-card { padding: 8px 12px; min-width: 100px; }
            .score-label { font-size: 1.1rem; }
            .score-value { font-size: 2rem; }
            .datetime-info { font-size: 0.9rem; padding: 6px 12px; }
            .interpret { padding: 14px 16px; font-size: 0.9rem; }
            .screenshot-btn { padding: 10px 24px; font-size: 1rem; }

            .reset-btn { padding: 8px 24px; }
        }
    </style>
</head>
<body>
<a class="home-floating" href="index.html" data-html2canvas-ignore="true">← 返回主页</a>
<div class="container" id="app">
    <h1>人格85自测量表</h1>
    <div class="guide">
        <strong>🧭 指导语：</strong> 请根据第一反应回答，每题选择“是”或“否”后会自动进入下一题。
    </div>

    <!-- 单题区域 (初始显示) -->
    <div id="singleQuestionContainer">
        <div class="question-card">
            <div class="q-num-large" id="questionNumber">第 1 / 85 题</div>
            <div class="q-text-large" id="questionText">加载中...</div>
            <div class="options-row" id="optionsRow">
                <label><input type="radio" name="single" value="yes"> 是</label>
                <label><input type="radio" name="single" value="no"> 否</label>
            </div>
            <div class="nav-panel">
                <button class="nav-btn" id="prevBtn" disabled>◀ 上一题</button>
                <button class="nav-btn" id="nextBtn" disabled>下一题 ▶</button>
            </div>
        </div>
    </div>

    <!-- 结果面板 (初始隐藏) 包含截图区域和按钮 -->
    <div id="resultPanel" class="result-panel hidden">
        <!-- 截图区域：包含所有要截图的内容 -->
        <div id="captureArea">
            <div class="scores" id="scoreCards"></div>
            <div class="datetime-info" id="datetimeDisplay"></div>
            <div class="interpret" id="interpretText"></div>
            <div id="extraWarning" class="warning"></div>
        </div>
        <!-- 截图按钮（不包含在截图区域内） -->
        <div style="text-align: center; margin-top: 16px;">
            <button class="screenshot-btn" id="screenshotBtn">📸 截图保存结果</button>
        </div>
    </div>

    <!-- 底部重置按钮 -->
    <div class="action-bar">
        <button class="reset-btn" id="resetBtn">⟲ 重新开始测评</button>
    </div>

    <!-- 页脚：仅保留计分说明 -->
    <div class="footnote">
        * 记分规则依据《人格问卷[成人85题]》。
    </div>
</div>

<script>
(function() {
    // ----- 全部85题题干 -----
    const questions = [
        "你是否有广泛的爱好",
        "再做任何事情之前你是否都要先考虑一番",
        "你的情绪时常波动么？",
        "当别人做了好事周围人却认为是你做的，你是否感到洋洋得意？",
        "你是一个健谈的人吗？",
        "你曾经无缘无故的感到自己可怜吗？",
        "你曾经有过因为贪心而获得分外的物质利益吗？",
        "晚上你是否会小心的把门锁好？",
        "你认为自己活泼吗？",
        "当你看到小孩或（动物）受折磨时是否会感到很难受？",
        "你是否时常担心你会说出（或做出）不应该说（或做）的事情？",
        "若你说过要做某件事，是否不管遇到什么困难都要把它做成？",
        "在愉快的聚会中，你是否尽情享受？",
        "你是一位易激怒的人吗？",
        "你是否有过自己做错了事反倒责备别人的时候？",
        "你喜欢会见陌生人么？",
        "你是否相信参加储蓄是一种好办法？",
        "你的感情是否容易受到伤害？",
        "你想服用有奇特效果或是有危险性的药物么？",
        "你是否时常感到\"极其厌烦\"？",
        "你曾多占、多得别人的东西(甚至是一针一线)吗？",
        "如果条件允许，你喜欢经常外出（旅行）么？",
        "对你所喜欢的人，你是否为取乐开过过头的玩笑么？",
        "你是否常因\"自罪感\"而烦恼？",
        "你是否谈论一些你自己毫无所知的事情？",
        "你是否宁愿看些书而不想去会见别人？",
        "有坏人想要害你么？",
        "你认为自己\"神经过敏\"吗？",
        "你的朋友多吗？",
        "你是个忧虑重重的人吗？",
        "你在儿童时代是否立即听从大人的吩咐而毫无怨言吗？",
        "你是一个无忧无虑，逍遥自在的人吗？",
        "有礼貌、爱整洁对你很重要吗？",
        "你是否担心将会发生可怕的事情？",
        "在结识新朋友时你通常是主动的吗？",
        "你觉得自己是一个非常敏感的人吗？",
        "和别人在一起的时候你是否不常说话？",
        "你是否觉得结婚是个框框，应该废除？",
        "你有时有点自吹自擂吗？",
        "在一个沉闷的场合，你能给大家添点生气吗？",
        "慢腾腾开车的司机是否使你讨厌？",
        "你担心自己的健康吗？",
        "你是否喜欢说笑话和谈论有趣的事情？",
        "你是否觉得大多数事情对你来说都是无所谓的？",
        "你小时候是否有过对待父母鲁莽、无礼的行为吗？",
        "你喜欢和别人打成一片、整天相处在一起吗？",
        "你失眠吗？",
        "你饭前必定先洗手吗？",
        "当别人问你话时你是否对答如流？",
        "你是否宁愿有富裕时间而早点动身去赴约会吗？",
        "你经常无缘无故感到疲倦或无精打采吗？",
        "在游戏或打牌时你经常作弊吗？",
        "你喜欢紧张的工作吗？",
        "你时常觉得自己的生活很单调吗？",
        "你曾经为了自己而利用过别人吗？",
        "你是否参加的活动太多而超过自己可能分配的时间？",
        "你是否有那么几个人时常躲着你?",
        "你是否认为人们为保障自己的将来而精打细算勤俭时间太多了？",
        "你是否曾经想过去死吗？",
        "若你确知不会被发现时你会少付给人家钱吗？",
        "你能使一个联欢会开成功吗？",
        "你是否尽力使自己不粗鲁？",
        "一件使你为难的事情过去之后是否会使你烦恼好久？",
        "你是否坚持要按照你的想法办事？",
        "当你去乘火车时，你是否会最后一分钟到达？",
        "你是否神经质？",
        "你常感到寂寞吗？",
        "你的言行总是一致的吗？",
        "你有时喜欢玩弄动物吗？",
        "有人对你或你的工作吹毛求疵时，是否容易伤害你的积极性？",
        "你去赴约会或上班时，曾否迟到？",
        "你是否喜欢在你的周围有许多热闹和高兴的事情？",
        "你愿意让别人怕你吗？",
        "你是否有时兴致勃勃，有时却很慵懒不想动弹？",
        "你有时会把今天应做的事情拖到明天吗？",
        "别人是否认为你是生气勃勃的？",
        "别人是否对你说过许多谎话？",
        "你是否对有些事情易性急生气？",
        "若你有错误，是否愿意承认？",
        "你是一个整洁严谨，有条不紊的人吗？",
        "在公园里或马路上，你是否总把果皮或废纸扔到垃圾箱里？",
        "遇到为难的事情，你是否拿不定主意？",
        "你是否有过随口骂人的时候？",
        "若你乘车或坐飞机外出时，你是否担心会碰撞或出意外？",
        "你是一个爱交往的人吗？"
    ];

    // ----- 评分规则 (题号从1开始) -----
    const scoring = {
        E: { yes: [1,5,9,13,16,22,29,32,35,40,43,46,49,53,56,61,72,76,85], no: [26,37] },
        N: { yes: [3,6,11,14,18,20,24,28,30,34,36,42,47,51,54,59,63,66,67,70,74,78,82,84], no: [] },
        P: { yes: [19,23,27,38,41,44,57,58,65,69,73,77], no: [2,8,10,17,33,50,62,80] },
        L: { yes: [12,31,48,68,79,81], no: [4,7,15,21,25,39,45,52,55,60,64,71,75,83] }
    };

    const scoringSets = {};
    for (let scale in scoring) {
        scoringSets[scale] = {
            yes: new Set(scoring[scale].yes),
            no: new Set(scoring[scale].no)
        };
    }

    // ----- 状态 -----
    let currentIndex = 0;
    const answers = new Array(85).fill(null);

    // DOM 元素
    const qNumberDiv = document.getElementById('questionNumber');
    const qTextDiv = document.getElementById('questionText');
    const radioYes = document.querySelector('input[value="yes"]');
    const radioNo = document.querySelector('input[value="no"]');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const singleContainer = document.getElementById('singleQuestionContainer');
    const resultPanel = document.getElementById('resultPanel');
    const scoreCardsDiv = document.getElementById('scoreCards');
    const datetimeDisplay = document.getElementById('datetimeDisplay');
    const interpretDiv = document.getElementById('interpretText');
    const extraWarning = document.getElementById('extraWarning');
    const guide = document.querySelector('.guide');

    // 截图按钮
    const screenshotBtn = document.getElementById('screenshotBtn');

    // ----- 辅助函数 -----
    function updateQuestionDisplay() {
        qNumberDiv.textContent = `第 ${currentIndex+1} / 85 题`;
        qTextDiv.textContent = questions[currentIndex];
        radioYes.checked = false;
        radioNo.checked = false;
        const saved = answers[currentIndex];
        if (saved === 'yes') radioYes.checked = true;
        else if (saved === 'no') radioNo.checked = true;
        prevBtn.disabled = (currentIndex === 0);
        updateNextButtonState();
    }

    function updateNextButtonState() {
        if (currentIndex === 84) {
            nextBtn.disabled = false;
        } else {
            nextBtn.disabled = (answers[currentIndex] === null);
        }
    }

    function saveCurrentAnswer() {
        if (radioYes.checked) answers[currentIndex] = 'yes';
        else if (radioNo.checked) answers[currentIndex] = 'no';
    }

    function goToIndex(index) {
        if (index < 0 || index >= 85) return;
        saveCurrentAnswer();
        currentIndex = index;
        updateQuestionDisplay();
    }

    function goToNext() {
        if (currentIndex < 84) {
            if (answers[currentIndex] === null) {
                alert('请先回答当前题目');
                return;
            }
            goToIndex(currentIndex + 1);
        } else if (currentIndex === 84) {
            if (answers[84] !== null) {
                finishTest();
            } else {
                alert('请回答最后一题');
            }
        }
    }

    function goToPrev() {
        if (currentIndex > 0) {
            goToIndex(currentIndex - 1);
        }
    }

    function allAnswered() {
        return answers.every(ans => ans !== null);
    }

    // 完成测试：直接计算并显示结果
    function finishTest() {
        if (!allAnswered()) {
            const missing = answers.reduce((acc, ans, idx) => ans === null ? acc.concat(idx+1) : acc, []);
            alert(`还有 ${missing.length} 题未回答，请返回完成。`);
            goToIndex(missing[0]-1);
            return;
        }

        singleContainer.classList.add('hidden');
        resultPanel.classList.remove('hidden');

        // 隐藏指导语
        if (guide) guide.style.display = 'none';

        renderResults(computeScores());
    }

    function computeScores() {
        const scores = { E:0, N:0, P:0, L:0 };
        for (let i = 0; i < 85; i++) {
            const ans = answers[i];
            const qNum = i + 1;
            for (let scale in scores) {
                const sets = scoringSets[scale];
                if (ans === 'yes' && sets.yes.has(qNum)) scores[scale] += 1;
                else if (ans === 'no' && sets.no.has(qNum)) scores[scale] += 1;
            }
        }
        return scores;
    }

    function renderResults(scores) {
        // 填充得分卡片
        scoreCardsDiv.innerHTML = `
            <div class="score-card"><div class="score-label">E</div><div class="score-value">${scores.E}</div><div>外向-内向</div></div>
            <div class="score-card"><div class="score-label">N</div><div class="score-value">${scores.N}</div><div>神经质</div></div>
            <div class="score-card"><div class="score-label">P</div><div class="score-value">${scores.P}</div><div>精神质</div></div>
            <div class="score-card"><div class="score-label">L</div><div class="score-value">${scores.L}</div><div>掩饰性</div></div>
        `;

        // 日期时间
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        datetimeDisplay.textContent = `📅 答题时间：${year}-${month}-${day} ${hours}:${minutes}`;

        // 解释文本
        let interp = '';
        const detailTexts = [];
        if (scores.E > 15) {
            interp += '🔹 <strong>E量表 (外向)：</strong>分数高于15，表示人格外向，可能是好交际，渴望刺激和冒险，情感易于冲动。';
            detailTexts.push(`E量表：${scores.E}分，外向`);
        } else if (scores.E < 8) {
            interp += '🔹 <strong>E量表 (内向)：</strong>分数低于8，表示人格内向，如好静，富于内省，不喜欢刺激，喜欢有秩序的生活方式，情绪比较稳定。';
            detailTexts.push(`E量表：${scores.E}分，内向`);
        } else {
            interp += `🔹 <strong>E量表 (中间型)：</strong>得分 ${scores.E} 在8-15之间，性格倾向不明显，兼具内外向特征。`;
            detailTexts.push(`E量表：${scores.E}分，中间型`);
        }

        if (scores.N > 14) {
            interp += '<br>🔹 <strong>N量表 (情绪不稳定)：</strong>分数高于14，表示焦虑、忧心忡忡、常郁郁不乐，有强烈情绪反应，甚至出现不够理智的行为。';
            detailTexts.push(`N量表：${scores.N}分，情绪不稳定`);
        } else if (scores.N < 9) {
            interp += '<br>🔹 <strong>N量表 (情绪稳定)：</strong>分数低于9，表示情绪稳定。';
            detailTexts.push(`N量表：${scores.N}分，情绪稳定`);
        } else {
            interp += `<br>🔹 <strong>N量表 (情绪性中等)：</strong>得分 ${scores.N} 在9-14之间，情绪反应适度。`;
            detailTexts.push(`N量表：${scores.N}分，情绪性中等`);
        }

        if (scores.P > 8) {
            interp += '<br>🔹 <strong>P量表 (精神质倾向)：</strong>分数高于8，表示可能是孤独、不关心他人，难以适应外部环境，不近人情，与别人不友好，喜欢寻衅搅扰，喜欢干奇特的事情，并且不顾危险。';
            detailTexts.push(`P量表：${scores.P}分，精神质倾向`);
        } else {
            interp += `<br>🔹 <strong>P量表 (正常范围)：</strong>得分 ${scores.P} ≤8，无显著精神质倾向。`;
            detailTexts.push(`P量表：${scores.P}分，正常范围`);
        }

        let lWarning = '';
        if (scores.L > 18) {
            interp += '<br>🔹 <strong>L量表 (高掩饰性)：</strong>分数高于18，显示被试有掩饰倾向，测验结果可能失真。';
            lWarning = '⚠️ L分高于18，结果可能受掩饰影响，解释需谨慎。';
            detailTexts.push(`L量表：${scores.L}分，高掩饰性，结果可能受掩饰影响`);
        } else {
            interp += `<br>🔹 <strong>L量表 (诚实度正常)：</strong>得分 ${scores.L} ≤18，回答相对真实。`;
            detailTexts.push(`L量表：${scores.L}分，回答相对真实`);
        }

        interpretDiv.innerHTML = interp;
        extraWarning.innerHTML = lWarning;
        try {
            let records = JSON.parse(sessionStorage.getItem('psyhealth-session-results') || '[]');
            const record = { id:'legacy-personality85', shortTitle:'人格85自测量表', resultTitle:'人格四维度原始分', score:`E:${scores.E} · N:${scores.N} · P:${scores.P} · L:${scores.L}`, scoreLabel:'结果', summary:detailTexts.join('；'), details:detailTexts, completedAt:new Date().toISOString() };
            window.PsyHealthStorage.saveResult(record);
        } catch (error) {}

        // 添加参考界限脚注
        const ref = document.createElement('p');
        ref.style.marginTop = '16px';
        ref.style.background = '#ddeeff';
        ref.style.padding = '10px 14px';
        ref.style.borderRadius = '24px';
        ref.innerHTML = '📘 <strong>参考界限：</strong>E: 外向>15，内向<8；N: 不稳定>14，稳定<9；P: 精神质>8；L: 掩饰>18。';
        interpretDiv.appendChild(ref);

        // 显示结果面板（指导语已隐藏）
        resultPanel.classList.remove('hidden');
    }

    function resetTest() {
        for (let i = 0; i < 85; i++) answers[i] = null;
        currentIndex = 0;
        updateQuestionDisplay();
        singleContainer.classList.remove('hidden');
        resultPanel.classList.add('hidden');

        // 恢复指导语显示
        if (guide) guide.style.display = 'block';

    }

    // 截图功能
    screenshotBtn.addEventListener('click', function() {
        const element = document.getElementById('captureArea');
        html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `EPQ结果_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(err => {
            alert('截图失败，可尝试手动截图。');
            console.error(err);
        });
    });

    // 事件绑定
    document.querySelectorAll('input[name="single"]').forEach(radio => {
        radio.addEventListener('change', function() {
            saveCurrentAnswer();
            if (currentIndex < 84) {
                setTimeout(() => { goToNext(); }, 100);
            } else if (currentIndex === 84) {
                if (answers[84] !== null) finishTest();
            }
            updateNextButtonState();
        });
    });

    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', function() {
        if (answers[currentIndex] === null) {
            alert('请先回答当前题目');
            return;
        }
        goToNext();
    });
    resetBtn.addEventListener('click', resetTest);
    // 初始化
    resetTest();
})();
</script>
