<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>找回密码 · PsyHealth</title><link rel="stylesheet" href="styles.css"></head><body><main class="app-shell"><header class="topbar"><a class="home-link" href="admin-login.html">← 返回机构登录</a></header><section class="panel admin-login-panel"><h1>找回密码</h1><form id="resetForm"><div class="phone-code-row"><label class="text-field"><span>手机号</span><input name="phone" inputmode="tel" autocomplete="tel" placeholder="请输入手机号" required></label><button class="secondary-btn send-code-inline" id="sendCode" type="button">发送验证码</button></div><label class="text-field"><span>短信验证码</span><input name="token" inputmode="numeric" autocomplete="one-time-code" placeholder="请输入收到的短信验证码" required></label><label class="text-field"><span>新密码</span><input name="password" type="password" minlength="8" required></label><p id="message" class="form-message"></p><button class="primary-btn" type="submit">验证并修改密码</button></form></section></main><script src="cloud-config.js"></script><script src="storage.js"></script><script src="forgot-password.js"></script></body></html>
