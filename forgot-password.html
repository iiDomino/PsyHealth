<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>找回密码 · 心理健康工作平台</title><link rel="stylesheet" href="styles.css?v=20260712k"></head><body><main class="app-shell"><header class="topbar"><a class="home-link" href="admin-login.html">← 返回机构登录</a></header><section class="panel admin-login-panel"><p class="eyebrow">账号安全</p><h1>找回登录密码</h1><p class="lead">请输入注册手机号，完成短信验证后即可设置新的登录密码。</p><form id="resetForm"><div class="phone-code-row"><label class="text-field"><span>手机号</span><input name="phone" inputmode="tel" autocomplete="tel" placeholder="请输入手机号" required></label><button class="secondary-btn send-code-inline" id="sendCode" type="button">发送验证码</button></div><label class="text-field digit-field"><span>短信验证码</span><input name="token" type="hidden"><span class="digit-grid digit-grid-6" data-digit-target="token" aria-label="短信验证码"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 1 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 2 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 3 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 4 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 5 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 6 位"></span></label><label class="text-field"><span>新登录密码</span><input name="password" type="password" minlength="8" placeholder="请设置至少 8 位新密码" required></label><p id="message" class="form-message"></p><button class="primary-btn" type="submit">验证并更新密码</button></form></section></main><footer class="site-contact">客服微信号：iiDomino <span class="site-legal"><a href="privacy-policy.html">隐私政策</a><a href="terms.html">用户协议</a></span></footer><script src="cloud-config.js?v=20260712k"></script><script src="storage.js?v=20260712k"></script><script src="forgot-password.js?v=20260712k"></script></body></html>
