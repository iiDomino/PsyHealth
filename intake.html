<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>来访者信息 · 心理健康工作平台</title><link rel="stylesheet" href="styles.css?v=20260711k"></head>
<body><main class="app-shell"><header class="topbar"><a class="home-link" href="index.html">← 返回首页</a></header>
  <section class="panel" id="intakeApp"><p class="eyebrow">来访入口</p><h1>来访者信息</h1><p class="lead">请如实填写基本信息，再次进入时，可用姓名和手机号后四位登录。</p>
    <form id="intakeForm">
      <div class="profile-grid">
        <label class="text-field"><span>来访者姓名</span><input name="name" autocomplete="name" required><small>请填写便于本人和机构识别的姓名或称呼；下次可配合手机号后四位找回档案。</small></label>
        <label class="text-field phone-last4-field"><span>手机号后四位</span><input name="phoneLast4" type="hidden"><span class="phone-digit-grid" aria-label="手机号后四位"><input class="phone-digit" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="手机号后四位第 1 位"><input class="phone-digit" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="手机号后四位第 2 位"><input class="phone-digit" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="手机号后四位第 3 位"><input class="phone-digit" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="手机号后四位第 4 位"></span></label>
        <label class="text-field"><span>性别</span><select name="gender" required><option value="">请选择</option><option>男</option><option>女</option><option>其他</option><option>不愿说明</option></select></label>
        <label class="text-field"><span>出生年</span><select name="birthYear" required><option value="">请选择出生年</option></select></label>
        <label class="text-field"><span>最高学历</span><select name="education" required><option value="">请选择</option><option>小学及以下</option><option>初中</option><option>高中／中专</option><option>大专</option><option>本科</option><option>硕士</option><option>博士及以上</option></select></label>
        <label class="text-field"><span>职业</span><input name="occupation" required></label>
        <label class="text-field"><span>婚姻状况</span><select name="marital" required><option value="">请选择</option><option>未婚</option><option>已婚</option><option>分居</option><option>离异</option><option>丧偶</option><option>其他</option></select></label>
        <label class="text-field profile-wide"><span>出生城市</span><input name="birthCity" required></label>
      </div>
      <fieldset class="form-section"><legend>主要咨询议题</legend><p class="field-help">可根据当前最希望讨论或评估的方向多选。</p>
        <label class="choice-row"><input type="checkbox" name="topic" value="婚恋情感"><span>1、婚恋情感</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="焦虑抑郁"><span>2、焦虑抑郁</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="儿童心理"><span>3、儿童心理</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="社会家庭"><span>4、社会家庭</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="法律相关"><span>5、法律相关</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="其它"><span>6、其它</span></label>
      </fieldset>
      <label class="text-field referral-field"><span>机构代码</span><input name="referralCode" autocomplete="off" minlength="4" maxlength="24" placeholder="请输入所属机构提供的代码" required></label>
      <p id="formError" class="error-text" role="alert"></p><button class="primary-btn full-btn" type="submit">保存来访资料</button>
    </form>
  </section></main><footer class="site-contact">如有任何疑问请与您的机构管理方联系。<span class="site-legal"><a href="privacy-policy.html">隐私政策</a><a href="terms.html">用户协议</a></span></footer><script src="cloud-config.js?v=20260711k"></script><script src="storage.js?v=20260711k"></script><script src="intake.js?v=20260711k"></script></body></html>
