<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>来访者信息 · 心理测试工具</title><link rel="stylesheet" href="styles.css?v=20260711h"></head>
<body><main class="app-shell"><header class="topbar"><a class="home-link" href="index.html">← 返回首页</a></header>
  <section class="panel" id="intakeApp"><p class="eyebrow">来访资料</p><h1>来访者信息</h1><p class="lead">第一次填写后会建立云端档案；下次只需填写姓名和手机号后四位，即可自动带出上次资料。</p><div class="notice consent-notice"><strong>姓名说明：</strong>姓名将作为下次进入个人档案的凭证，提交后基本信息无法自行更改。若提示或发现同名档案但并非本人，请使用系统推荐的后缀姓名。</div>
    <form id="intakeForm">
      <div class="profile-grid">
        <label class="text-field"><span>来访者姓名</span><input name="name" autocomplete="name" required><small>下次可用姓名和手机号后四位快速找回资料。</small></label>
        <label class="text-field"><span>手机号后四位</span><input name="phoneLast4" inputmode="numeric" autocomplete="off" pattern="\d{4}" maxlength="4" placeholder="例如 9573" required></label>
        <label class="text-field"><span>性别</span><select name="gender" required><option value="">请选择</option><option>男</option><option>女</option><option>其他</option><option>不愿说明</option></select></label>
        <label class="text-field"><span>出生年</span><select name="birthYear" required><option value="">请选择出生年</option></select></label>
        <label class="text-field"><span>最高学历</span><select name="education" required><option value="">请选择</option><option>小学及以下</option><option>初中</option><option>高中／中专</option><option>大专</option><option>本科</option><option>硕士</option><option>博士及以上</option></select></label>
        <label class="text-field"><span>职业</span><input name="occupation" required></label>
        <label class="text-field"><span>婚姻状况</span><select name="marital" required><option value="">请选择</option><option>未婚</option><option>已婚</option><option>分居</option><option>离异</option><option>丧偶</option><option>其他</option></select></label>
        <label class="text-field profile-wide"><span>出生城市</span><input name="birthCity" required></label>
      </div>
      <fieldset class="form-section"><legend>咨询问题分类</legend><p class="field-help">可多选。</p>
        <label class="choice-row"><input type="checkbox" name="topic" value="婚恋情感"><span>1、婚恋情感</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="焦虑抑郁"><span>2、焦虑抑郁</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="儿童心理"><span>3、儿童心理</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="社会家庭"><span>4、社会家庭</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="法律相关"><span>5、法律相关</span></label>
        <label class="choice-row"><input type="checkbox" name="topic" value="其它"><span>6、其它</span></label>
      </fieldset>
      <label class="text-field referral-field"><span>机构代码</span><input name="referralCode" autocomplete="off" minlength="4" maxlength="24" placeholder="请输入机构代码" required></label>
      <div class="notice consent-notice"><strong>提交前请确认：</strong>来访资料、机构代码和测评结果会保存至云端，并可由对应机构账号查看和管理。继续提交表示你已阅读并同意<a href="privacy-policy.html">《隐私政策》</a>和<a href="terms.html">《用户协议》</a>。</div>
      <p id="formError" class="error-text" role="alert"></p><button class="primary-btn full-btn" type="submit">保存来访者信息</button>
    </form>
  </section></main><footer class="site-contact">如有任何疑问请与您的机构管理方联系。<span class="site-legal"><a href="privacy-policy.html">隐私政策</a><a href="terms.html">用户协议</a></span></footer><script src="cloud-config.js?v=20260711h"></script><script src="storage.js?v=20260711h"></script><script src="intake.js?v=20260711h"></script></body></html>
