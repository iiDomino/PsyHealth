<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>机构注册 · 心理健康工作平台</title><link rel="stylesheet" href="styles.css?v=20260712k"></head><body><main class="app-shell"><header class="topbar"><a class="home-link" href="admin-login.html">← 返回机构登录</a></header><section class="panel admin-login-panel"><p class="eyebrow">机构服务</p><h1>注册机构账号</h1><p class="lead">注册后可创建机构代码并管理本机构来访者测评资料；如有系统邀请码，可获得 3 天试用时长。</p><form id="registerForm"><label class="text-field"><span>机构名称</span><input name="name" placeholder="请填写对来访者可识别的机构名称" required></label><label class="text-field"><span>登录密码</span><input name="password" type="password" minlength="8" placeholder="请设置至少 8 位密码" required></label><div class="phone-code-row"><label class="text-field"><span>手机号</span><input name="phone" inputmode="tel" autocomplete="tel" placeholder="请输入手机号" required></label><button class="secondary-btn send-code-inline" id="sendCode" type="button">发送验证码</button></div><label class="text-field digit-field"><span>短信验证码</span><input name="token" type="hidden"><span class="digit-grid digit-grid-6" data-digit-target="token" aria-label="短信验证码"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 1 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 2 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 3 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 4 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 5 位"><input class="digit-input" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="短信验证码第 6 位"></span></label><label class="text-field digit-field"><span>试用邀请码 <small>可选</small></span><input name="trialCode" type="hidden"><span class="digit-grid digit-grid-4" data-digit-target="trialCode" aria-label="试用邀请码"><input class="digit-input" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="试用邀请码第 1 位"><input class="digit-input" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="试用邀请码第 2 位"><input class="digit-input" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="试用邀请码第 3 位"><input class="digit-input" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="试用邀请码第 4 位"></span></label><p id="trialCodeState" class="form-message"></p><p id="message" class="form-message"></p><button class="primary-btn" type="submit">验证并完成注册</button></form></section></main><footer class="site-contact">客服微信号：iiDomino <span class="site-legal"><a href="privacy-policy.html">隐私政策</a><a href="terms.html">用户协议</a></span></footer><script src="cloud-config.js?v=20260712k"></script><script src="storage.js?v=20260712k"></script><script src="institution-register.js?v=20260712k"></script></body></html>
