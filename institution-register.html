<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>机构注册 · PsyHealth</title><link rel="stylesheet" href="styles.css"></head><body><main class="app-shell"><header class="topbar"><a class="home-link" href="admin-login.html">← 返回机构登录</a></header><section class="panel admin-login-panel"><p class="eyebrow">PsyHealth 机构服务</p><h1>机构注册</h1><form id="registerForm"><label class="text-field"><span>机构名称</span><input name="name" required></label><label class="text-field"><span>邮箱</span><input name="email" type="email" required></label><label class="text-field"><span>密码</span><input name="password" type="password" minlength="10" required></label><label class="text-field"><span>邮箱验证码</span><input name="token" inputmode="numeric" autocomplete="one-time-code" placeholder="先点击发送验证码"></label><p id="message" class="form-message"></p><button class="secondary-btn" id="sendCode" type="button">发送验证码</button><button class="primary-btn" type="submit">验证并注册</button></form></section></main><script src="cloud-config.js"></script><script src="storage.js"></script><script src="institution-register.js"></script></body></html>
